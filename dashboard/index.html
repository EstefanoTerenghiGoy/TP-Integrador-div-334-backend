<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
</head>

<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/logo.jpg" alt="">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>

        </ul>
    </header>

    <main>
        <section class="seccion-productos">
            <h2>Nuestros productos</h2>
            <div id="contenedor-productos">
                <!-- <div class="card-producto">
                    <img src="assets/logo.jpg" alt="">
                    <h3>Hamburguesa</h3>
                    <p>ID: 1</p>
                    <p>Precio: $3000</p>
                </div> -->
            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById('contenedor-productos')

        async function mostrarProductos() {
            try {
                const response = await fetch("http://localhost:3000/api/products")

                //Verificar que la respuesta HTTP fue exitosa o crear un error si no lo fue
                if(!response.ok){
                    throw new Error(`<br>Error ${response.statusText} ${response.status}`)
                }


                const datos = await response.json()
                let productos = datos.payload

                renderizarProductos(productos)

            } catch (error) {
                //Mostrar el error en el DOM (Visualmente)
                contenedorProductos.innerHTML = `
                    <p class="error">Error al cargar los productos ${error.message}</p>
                `
            }
        }

        function renderizarProductos(productos){
            let htmlProductos = ""
            productos.forEach(producto => {
                htmlProductos += `
                <div class="card-producto">
                    <img src="assets/logo.jpg" alt="">
                    <h3>${producto.nombre}</h3>
                    <p>id: ${producto.id}</p>
                    <p>$${producto.precio}</p>
                </div>
                `
            });
            
            contenedorProductos.innerHTML = htmlProductos
        }

        mostrarProductos()
    </script>

</body>

</html>
