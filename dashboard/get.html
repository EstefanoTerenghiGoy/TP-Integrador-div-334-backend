<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/logo.jpg" alt="">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="post.html">
                    <span>CONSULTAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="get.html">
                    <span>CREAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>

        </ul>
    </header>

    <main>
        <section class="form-productos">
            <h2>Consultar producto por ID</h2>

            <form id="getProducto-form">
                <label for="idProducto">ID del producto</label>
                <input type="number" name="idProd" id="idProd" required>

                <input type="submit" value="Consultar producto">
            </form>
        </section>

        <section class="seccion-productos">
            <hr>
            <div id="contenedor-productos">
                <!-- 
                    <ul>
                        <li class="lista-producto">
                            <img src="https://pointlaventanita.com/wp-content/uploads/2024/05/chabona.webp" alt="Fernet Cola Chabona">
                            <p>Id: 41 / Nombre: Fernet Cola Chabona / <strong>Precio: $4200</strong></p>
                        </li>
                    </ul>
                -->
            </div>
        </section>
    </main>

    <script>
        const contenedorProductos = document.getElementById('contenedor-productos')
        const getProductoForm = document.getElementById('getProducto-form')

        getProductoForm.addEventListener('submit', async event =>{
            event.preventDefault()

            const idProd = event.target.idProd.value.trim();
            try {
                const response = await fetch(`http://localhost:3000/api/productos/${idProd}`)

                if(!response.ok){
                    const errorDatos = await response.json()
                    throw new Error(`${errorDatos.message}`)
                }

                const datos = await response.json()
                const producto = datos.payload;

                renderizarProducto(producto[0])
            } catch (error) {
                contenedorProductos.innerHTML = `<p class="error">Error al cargar el producto. ${error.message}</p>`
            }

        })


        function renderizarProducto(producto) {
            let htmlProducto = `
            <ul class="card-producto">
                <li class="lista-producto">
                    <img src="assets/logo.jpg" alt="">
                    <h3>${producto.nombre}</h3>
                    <p>id: ${producto.id}</p>
                    <p>$${producto.precio}</p>
                </li>
            </ul>
            `;

            contenedorProductos.innerHTML = htmlProducto;
        }
    </script>
</body>
</html>
