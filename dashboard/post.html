<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear producto</title>
    <link rel="shortcut icon" href="assets/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-vader.css" type="text/css">
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html" class="logo-container">
                <img src="assets/logo.jpg" alt="">
            </a>
        </div>

        <ul class="enlaces">
            <li class="enlace">
                <a href="get.html">
                    <span>CONSULTAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="post.html">
                    <span>CREAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="put.html">
                    <span>MODIFICAR</span>
                </a>
            </li>
            <li class="enlace">
                <a href="delete.html">
                    <span>ELIMINAR</span>
                </a>
            </li>

        </ul>
    </header>

    <main>
        <section class="form-productos">
            <h2>Crear producto</h2>

            <form id="crear-form">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>

                <label for="precio">Precio</label>
                <input type="number" id="precio" name="precio" required>

                <label for="disponibilidad">Disponibilidad</label>
                <select id="disponibilidad" name="disponibilidad">
                    <option value="1">Disponible</option>
                    <option value="0">No disponible</option>
                </select>

                <label for="img">Ruta de imagen</label>
                <input type="text" id="img" name="img" placeholder="../../assets/categoria/nombre.png" required>

                <label for="categoria">Categoría</label>
                <select id="categoria" name="categoria">
                    <option value="teclado">Teclado</option>
                    <option value="mouse">Mouse</option>
                </select>

                <input type="submit" value="Crear producto">
            </form>
        </section>

        <section>
            <div id="mensaje"></div>
        </section>
    </main>

    <script>
        const urlBase = "http://localhost:3000/api/products";

        const crearForm = document.getElementById("crear-form");
        const mensaje = document.getElementById("mensaje");

        crearForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            const body = {
                nombre: event.target.nombre.value.trim(),
                precio: Number(event.target.precio.value),
                disponibilidad: Number(event.target.disponibilidad.value),
                img: event.target.img.value.trim(),
                categoria: event.target.categoria.value
            };

            try {
                const response = await fetch(urlBase, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(body)});
                const datos = await response.json();

                if(!response.ok){
                    mostrarError(datos.message);
                    return;
                }

                mensaje.innerHTML = `
                    <p class="mensaje exito">
                        ${datos.message}<br>
                        ID del nuevo producto: ${datos.productId}
                    </p>
                `;

                crearForm.reset();
            } catch (error) {
                mostrarError(error.message);
            }

        });

        function mostrarError(texto) {
            mensaje.innerHTML = `
                <p class="mensaje error">${texto}</p>
            `;
        }
    </script>
</body>
</html>
